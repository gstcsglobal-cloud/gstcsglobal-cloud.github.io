<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>글로벌 스크러버 설치 현황 대시보드</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/papaparse@5.4.1/papaparse.min.js"></script>
<style>
  :root{
    --bg:#0f172a; --panel:#1e293b; --panel2:#273449; --line:#334155;
    --txt:#e2e8f0; --mut:#94a3b8; --accent:#38bdf8; --accent2:#2dd4bf;
    --c1:#38bdf8;--c2:#2dd4bf;--c3:#a78bfa;--c4:#fbbf24;--c5:#f472b6;--c6:#34d399;--c7:#fb7185;--c8:#60a5fa;
    --ok:#34d399; --warn:#fbbf24; --bad:#fb7185;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:'Segoe UI','Malgun Gothic',sans-serif;background:var(--bg);color:var(--txt);padding:24px;}
  h1{font-size:22px;font-weight:700;}
  .sub{color:var(--mut);font-size:13px;margin-top:4px;}
  header{display:flex;justify-content:space-between;align-items:flex-end;flex-wrap:wrap;gap:12px;margin-bottom:20px;border-bottom:1px solid var(--line);padding-bottom:16px;}
  .header-right{display:flex;align-items:center;gap:10px;}
  .status{font-size:12px;color:var(--mut);}
  .btn-back{background:rgba(255,255,255,0.07);border:1px solid rgba(255,255,255,0.15);color:var(--txt);
    padding:8px 18px;border-radius:30px;font-size:13px;font-weight:700;cursor:pointer;text-decoration:none;display:inline-block;}
  .btn-back:hover{background:rgba(255,255,255,0.12);}
  .kpis{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:14px;margin-bottom:20px;}
  .kpi{background:var(--panel);border:1px solid var(--line);border-radius:12px;padding:16px 18px;}
  .kpi .v{font-size:30px;font-weight:700;color:var(--accent);}
  .kpi .l{font-size:12px;color:var(--mut);margin-top:4px;text-transform:uppercase;letter-spacing:.5px;}
  .kpi.ok .v{color:var(--ok);} .kpi.bad .v{color:var(--bad);}
  .grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(320px,1fr));gap:16px;margin-bottom:20px;}
  .card{background:var(--panel);border:1px solid var(--line);border-radius:12px;padding:18px;}
  .card h3{font-size:14px;font-weight:600;margin-bottom:14px;color:var(--txt);}
  .chart-wrap{position:relative;height:240px;}
  .filters{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:14px;}
  .filters input,.filters select{background:var(--panel2);border:1px solid var(--line);color:var(--txt);
    padding:9px 12px;border-radius:8px;font-size:13px;outline:none;}
  .filters input{flex:1;min-width:200px;}
  .filters input:focus,.filters select:focus{border-color:var(--accent);}
  .tbl-wrap{overflow:auto;max-height:560px;border:1px solid var(--line);border-radius:10px;}
  table{width:100%;border-collapse:collapse;font-size:12.5px;white-space:nowrap;}
  thead th{position:sticky;top:0;background:var(--panel2);padding:10px 12px;text-align:left;font-weight:600;
    border-bottom:1px solid var(--line);cursor:pointer;user-select:none;}
  thead th:hover{color:var(--accent);}
  tbody td{padding:9px 12px;border-bottom:1px solid var(--line);}
  tbody tr:hover{background:var(--panel2);}
  .pill{padding:2px 9px;border-radius:99px;font-size:11px;font-weight:600;}
  .pill.ok{background:rgba(52,211,153,.15);color:var(--ok);}
  .pill.bad{background:rgba(251,113,133,.15);color:var(--bad);}
  .loading{text-align:center;padding:60px;color:var(--mut);}
  .err{background:rgba(251,113,133,.1);border:1px solid var(--bad);color:#fecaca;padding:16px;border-radius:10px;}
  .full{grid-column:1/-1;}
  footer{margin-top:24px;color:var(--mut);font-size:11px;text-align:center;}
</style>
</head>
<body>
<header>
  <div>
    <h1>🌐 글로벌 스크러버 설치 현황</h1>
    <div class="sub">고객사 설치 스크러버 통합 모니터링 대시보드</div>
  </div>
  <div class="header-right">
    <a href="../" class="btn-back">← 메인으로</a>
    <div class="status" id="status">데이터 로딩 중…</div>
  </div>
</header>

<div id="app"><div class="loading">⏳ 구글시트에서 데이터를 불러오는 중입니다…</div></div>

<footer>데이터 출처: Google Sheets · 자동 동기화 · 마지막 갱신 <span id="ts"></span></footer>

<script>
const SHEET_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vTr_0-rtwnz47XAWsHUJT7acg5vgrVPe4Gk17ArnsWfnV_30Y4BJXIBRZZ1bAw33TUsqDmoz0LgzbOP/pub?gid=891608329&single=true&output=csv';

const COL = {
  country:2, customer:3, location:4, code:5, sn:6, model:7, burner:8,
  fab:9, floor:10, bay:11, group1:12, group2:13, detail1:14, detail2:15,
  toolMaker:18, toolModel:19, pumpMaker:20, pumpModel:21,
  fabIn:38, start:39, turnOn:40, release:41, warranty:42, warrIO:43
};

const PALETTE=['#38bdf8','#2dd4bf','#a78bfa','#fbbf24','#f472b6','#34d399','#fb7185','#60a5fa','#c084fc','#4ade80'];
const charts={};

function toDate(v){
  if(v===null||v===undefined||v==="")return null;
  const n=Number(v);
  if(!isNaN(n)&&n>20000&&n<80000){ return new Date(Date.UTC(1899,11,30)+n*86400000); }
  const d=new Date(v);
  return isNaN(d)?null:d;
}
function fmtDate(d){ return d? d.toISOString().slice(0,10):"—"; }

async function load(){
  try{
    const res = await fetch(SHEET_URL + '&t=' + Date.now());
    const text = await res.text();
    const parsed = Papa.parse(text, {skipEmptyLines:true});
    let rows = parsed.data.slice(1);
    rows = rows.filter(r=>r[COL.code]&&String(r[COL.code]).trim()!=="");
    render(rows);
  }catch(e){
    document.getElementById('app').innerHTML='<div class="err">❌ 데이터를 불러오지 못했습니다: '+e.message+'</div>';
  }
}

function countBy(rows,idx){
  const m={};
  rows.forEach(r=>{const k=(r[idx]||"미지정").toString().trim()||"미지정"; m[k]=(m[k]||0)+1;});
  return Object.entries(m).sort((a,b)=>b[1]-a[1]);
}

function render(rows){
  const now=new Date();
  const countries=new Set(rows.map(r=>r[COL.country]).filter(Boolean));
  const customers=new Set(rows.map(r=>r[COL.customer]).filter(Boolean));
  let active=0,expired=0;
  rows.forEach(r=>{const w=toDate(r[COL.warranty]); if(w){ w>=now?active++:expired++; }});

  document.getElementById('status').textContent=`총 ${rows.length}대 · ${countries.size}개국 · ${customers.size}개 고객사`;
  document.getElementById('ts').textContent=new Date().toLocaleString('ko-KR');

  document.getElementById('app').innerHTML=`
    <div class="kpis">
      <div class="kpi"><div class="v">${rows.length}</div><div class="l">총 설치 대수</div></div>
      <div class="kpi"><div class="v">${countries.size}</div><div class="l">설치 국가</div></div>
      <div class="kpi"><div class="v">${customers.size}</div><div class="l">고객사</div></div>
      <div class="kpi ok"><div class="v">${active}</div><div class="l">워런티 유효</div></div>
      <div class="kpi bad"><div class="v">${expired}</div><div class="l">워런티 만료</div></div>
    </div>
    <div class="grid">
      <div class="card"><h3>🌍 국가별 설치 현황</h3><div class="chart-wrap"><canvas id="cCountry"></canvas></div></div>
      <div class="card"><h3>🏢 고객사별 설치 현황</h3><div class="chart-wrap"><canvas id="cCustomer"></canvas></div></div>
      <div class="card"><h3>⚙️ 스크러버 모델</h3><div class="chart-wrap"><canvas id="cModel"></canvas></div></div>
      <div class="card"><h3>🧪 공정 그룹</h3><div class="chart-wrap"><canvas id="cGroup"></canvas></div></div>
      <div class="card"><h3>📅 연도별 가동(Turn On)</h3><div class="chart-wrap"><canvas id="cYear"></canvas></div></div>
      <div class="card"><h3>🛡️ 워런티 상태</h3><div class="chart-wrap"><canvas id="cWarr"></canvas></div></div>
    </div>
    <div class="card full">
      <h3>📋 설치 상세 목록</h3>
      <div class="filters">
        <input id="q" placeholder="🔍 검색 (S/N, Location, Tool 등)…">
        <select id="fCountry"><option value="">전체 국가</option></select>
        <select id="fCustomer"><option value="">전체 고객사</option></select>
        <select id="fModel"><option value="">전체 모델</option></select>
        <select id="fGroup"><option value="">전체 공정</option></select>
      </div>
      <div class="tbl-wrap"><table id="tbl">
        <thead><tr>
          <th data-k="${COL.code}">Code</th><th data-k="${COL.sn}">S/N</th>
          <th data-k="${COL.country}">국가</th><th data-k="${COL.customer}">고객사</th>
          <th data-k="${COL.location}">Location</th><th data-k="${COL.fab}">FAB</th>
          <th data-k="${COL.model}">모델</th><th data-k="${COL.group1}">공정</th>
          <th data-k="${COL.detail1}">Detail</th><th data-k="${COL.toolMaker}">Tool Maker</th>
          <th data-k="${COL.toolModel}">Tool Model</th><th data-k="${COL.turnOn}">Turn On</th>
          <th data-k="${COL.warranty}">워런티</th>
        </tr></thead>
        <tbody id="tbody"></tbody>
      </table></div>
    </div>`;

  const mk=(id,type,data,opts)=>{charts[id]=new Chart(document.getElementById(id),{type,data,options:opts});};
  const barOpt={responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},
    scales:{x:{ticks:{color:'#94a3b8'},grid:{display:false}},y:{ticks:{color:'#94a3b8'},grid:{color:'#334155'}}}};
  const dnOpt={responsive:true,maintainAspectRatio:false,plugins:{legend:{position:'right',labels:{color:'#cbd5e1',font:{size:11}}}}};

  const ctry=countBy(rows,COL.country);
  mk('cCountry','bar',{labels:ctry.map(x=>x[0]),datasets:[{data:ctry.map(x=>x[1]),backgroundColor:'#38bdf8',borderRadius:5}]},barOpt);
  const cust=countBy(rows,COL.customer);
  mk('cCustomer','bar',{labels:cust.map(x=>x[0]),datasets:[{data:cust.map(x=>x[1]),backgroundColor:'#2dd4bf',borderRadius:5}]},barOpt);
  const mdl=countBy(rows,COL.model);
  mk('cModel','doughnut',{labels:mdl.map(x=>x[0]),datasets:[{data:mdl.map(x=>x[1]),backgroundColor:PALETTE}]},dnOpt);
  const grp=countBy(rows,COL.group1);
  mk('cGroup','doughnut',{labels:grp.map(x=>x[0]),datasets:[{data:grp.map(x=>x[1]),backgroundColor:PALETTE}]},dnOpt);
  const yrs={};
  rows.forEach(r=>{const d=toDate(r[COL.turnOn]); if(d){const y=d.getUTCFullYear(); yrs[y]=(yrs[y]||0)+1;}});
  const yk=Object.keys(yrs).sort();
  mk('cYear','bar',{labels:yk,datasets:[{data:yk.map(y=>yrs[y]),backgroundColor:'#a78bfa',borderRadius:5}]},barOpt);
  mk('cWarr','doughnut',{labels:['유효','만료'],datasets:[{data:[active,expired],backgroundColor:['#34d399','#fb7185']}]},dnOpt);

  const fill=(id,idx)=>{const s=document.getElementById(id);countBy(rows,idx).forEach(([k])=>{const o=document.createElement('option');o.value=k;o.textContent=k;s.appendChild(o);});};
  fill('fCountry',COL.country);fill('fCustomer',COL.customer);fill('fModel',COL.model);fill('fGroup',COL.group1);

  let sortK=null,sortAsc=true;
  function draw(){
    const q=document.getElementById('q').value.toLowerCase();
    const fc=document.getElementById('fCountry').value, fcu=document.getElementById('fCustomer').value,
          fm=document.getElementById('fModel').value, fg=document.getElementById('fGroup').value;
    let d=rows.filter(r=>{
      if(fc&&r[COL.country]!==fc)return false;
      if(fcu&&r[COL.customer]!==fcu)return false;
      if(fm&&r[COL.model]!==fm)return false;
      if(fg&&r[COL.group1]!==fg)return false;
      if(q&&!r.join(' ').toLowerCase().includes(q))return false;
      return true;
    });
    if(sortK!==null){d.sort((a,b)=>{const x=(a[sortK]||'')+'',y=(b[sortK]||'')+'';return sortAsc?x.localeCompare(y,'ko',{numeric:true}):y.localeCompare(x,'ko',{numeric:true});});}
    const now=new Date();
    document.getElementById('tbody').innerHTML=d.map(r=>{
      const w=toDate(r[COL.warranty]); const ok=w&&w>=now;
      const wp=w?`<span class="pill ${ok?'ok':'bad'}">${fmtDate(w)}</span>`:'—';
      const cell=i=>r[i]!=null&&r[i]!==''?r[i]:'—';
      return `<tr><td>${cell(COL.code)}</td><td>${cell(COL.sn)}</td><td>${cell(COL.country)}</td>
        <td>${cell(COL.customer)}</td><td>${cell(COL.location)}</td><td>${cell(COL.fab)}</td>
        <td>${cell(COL.model)}</td><td>${cell(COL.group1)}</td><td>${cell(COL.detail1)}</td>
        <td>${cell(COL.toolMaker)}</td><td>${cell(COL.toolModel)}</td><td>${fmtDate(toDate(r[COL.turnOn]))}</td>
        <td>${wp}</td></tr>`;
    }).join('')||'<tr><td colspan="13" style="text-align:center;color:#94a3b8;padding:30px">검색 결과 없음</td></tr>';
  }
  ['q','fCountry','fCustomer','fModel','fGroup'].forEach(id=>document.getElementById(id).addEventListener('input',draw));
  document.querySelectorAll('#tbl thead th').forEach(th=>th.addEventListener('click',()=>{
    const k=+th.dataset.k; if(sortK===k)sortAsc=!sortAsc;else{sortK=k;sortAsc=true;} draw();
  }));
  draw();
}
load();
</script>
</body>
</html>
