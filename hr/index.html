<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>인력 현황 대시보드</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
:root{
  --bg1:#0f0c29; --bg2:#302b63; --bg3:#24243e;
  --accent:#6c5ce7; --accent2:#00cec9; --accent3:#fd79a8;
  --glass:rgba(255,255,255,0.07); --glassb:rgba(255,255,255,0.12);
  --txt:#f5f6fa; --muted:#a0a0c0;
}
body{
  font-family:'Segoe UI','Malgun Gothic',sans-serif; color:var(--txt);
  background:linear-gradient(-45deg,var(--bg1),var(--bg2),var(--bg3),#1a1a2e);
  background-size:400% 400%; animation:grad 18s ease infinite; min-height:100vh; padding:28px 32px;
}
@keyframes grad{0%{background-position:0% 50%}50%{background-position:100% 50%}100%{background-position:0% 50%}}
.header{display:flex;align-items:center;justify-content:space-between;margin-bottom:24px;flex-wrap:wrap;gap:12px}
.header h1{font-size:32px;font-weight:800;background:linear-gradient(90deg,#00cec9,#6c5ce7,#fd79a8);
  -webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent;letter-spacing:-1px}
.header .sub{color:var(--muted);font-size:13px;margin-top:4px}
.header-right{display:flex;align-items:center;gap:12px;flex-wrap:wrap}
.badge{background:var(--glass);border:1px solid var(--glassb);border-radius:30px;padding:8px 18px;font-size:13px;backdrop-filter:blur(10px)}
.btn{background:linear-gradient(90deg,var(--accent),var(--accent2));border:none;border-radius:30px;color:#fff;font-size:13px;font-weight:700;cursor:pointer;padding:9px 20px;transition:opacity .2s;text-decoration:none;display:inline-block;}
.btn:hover{opacity:.85} .btn:disabled{opacity:.5;cursor:not-allowed}
.btn-back{background:var(--glass);border:1px solid var(--glassb);color:var(--txt);}
.status{font-size:12px;color:var(--muted);margin-bottom:16px;text-align:right;}
.status.ok{color:var(--accent2)} .status.err{color:#fd79a8}
.slicers{display:flex;gap:18px;flex-wrap:wrap;margin-bottom:24px}
.slicer{background:var(--glass);border:1px solid var(--glassb);border-radius:18px;padding:14px 18px;backdrop-filter:blur(12px)}
.slicer .lbl{font-size:11px;text-transform:uppercase;letter-spacing:1.5px;color:var(--muted);margin-bottom:10px;font-weight:700}
.chips{display:flex;gap:8px;flex-wrap:wrap}
.chip{cursor:pointer;border:1px solid var(--glassb);background:rgba(255,255,255,0.04);color:var(--txt);
  padding:7px 15px;border-radius:30px;font-size:13px;font-weight:600;transition:all .25s;user-select:none}
.chip:hover{transform:translateY(-2px);border-color:var(--accent2)}
.chip.active{background:linear-gradient(90deg,var(--accent),var(--accent2));border-color:transparent;box-shadow:0 6px 20px rgba(108,92,231,.5)}
.search{margin-left:auto}
.search input{background:rgba(255,255,255,0.06);border:1px solid var(--glassb);border-radius:30px;padding:10px 18px;color:var(--txt);font-size:13px;width:200px;outline:none}
.search input::placeholder{color:var(--muted)}
.kpis{display:grid;grid-template-columns:repeat(4,1fr);gap:18px;margin-bottom:24px}
.kpi{background:var(--glass);border:1px solid var(--glassb);border-radius:22px;padding:22px;backdrop-filter:blur(14px);position:relative;overflow:hidden;transition:transform .3s}
.kpi:hover{transform:translateY(-5px)}
.kpi::before{content:'';position:absolute;top:-40px;right:-40px;width:120px;height:120px;border-radius:50%;opacity:.35}
.kpi.k1::before{background:var(--accent)}.kpi.k2::before{background:var(--accent2)}
.kpi.k3::before{background:var(--accent3)}.kpi.k4::before{background:#fdcb6e}
.kpi .ic{font-size:22px;margin-bottom:8px}
.kpi .val{font-size:38px;font-weight:800;line-height:1}
.kpi .cap{color:var(--muted);font-size:13px;margin-top:8px;font-weight:600}
.grid{display:grid;grid-template-columns:1.1fr 1fr 1fr;gap:18px;margin-bottom:24px}
.card{background:var(--glass);border:1px solid var(--glassb);border-radius:22px;padding:20px;backdrop-filter:blur(14px)}
.card h3{font-size:14px;font-weight:700;margin-bottom:14px;color:#dfe6ff}
.card .cw{position:relative;height:240px}
.tablecard{background:var(--glass);border:1px solid var(--glassb);border-radius:22px;padding:20px;backdrop-filter:blur(14px)}
.tablecard h3{font-size:14px;font-weight:700;margin-bottom:14px}
table{width:100%;border-collapse:collapse;font-size:13px}
th{text-align:left;padding:10px 12px;color:var(--muted);font-size:11px;text-transform:uppercase;letter-spacing:1px;border-bottom:1px solid var(--glassb);position:sticky;top:0;background:rgba(20,18,45,.9)}
td{padding:9px 12px;border-bottom:1px solid rgba(255,255,255,.05)}
tr:hover td{background:rgba(255,255,255,.04)}
.tag{padding:3px 10px;border-radius:20px;font-size:11px;font-weight:700}
.t-done{background:rgba(0,206,201,.18);color:#00cec9}
.t-prog{background:rgba(253,203,110,.2);color:#fdcb6e}
.t-na{background:rgba(160,160,192,.18);color:#a0a0c0}
.tw{max-height:360px;overflow-y:auto;border-radius:12px}
.tw::-webkit-scrollbar{width:8px}.tw::-webkit-scrollbar-thumb{background:var(--glassb);border-radius:4px}
.empty{text-align:center;padding:30px;color:var(--muted)}
@media(max-width:1100px){.kpis{grid-template-columns:repeat(2,1fr)}.grid{grid-template-columns:1fr}}
</style>
</head>
<body>
<div class="header">
  <div>
    <h1>인력 현황 대시보드</h1>
    <div class="sub">엔지니어 교육 · 직급 · 직무 인터랙티브 분석</div>
  </div>
  <div class="header-right">
    <a href="https://gstcsglobal-cloud.github./io" class="btn btn-back">← 메인으로</a>
    <div class="badge">총 <b id="totRec">0</b>명 · 실시간 필터</div>
    <button class="btn" id="refreshBtn" onclick="loadData()">🔄 새로고침</button>
  </div>
</div>
<div class="status" id="status">데이터 불러오는 중...</div>

<div class="slicers">
  <div class="slicer"><div class="lbl">직급</div><div class="chips" id="sl-pos"></div></div>
  <div class="slicer"><div class="lbl">직무</div><div class="chips" id="sl-job"></div></div>
  <div class="slicer"><div class="lbl">Basic 교육</div><div class="chips" id="sl-basic"></div></div>
  <div class="slicer"><div class="lbl">Veteran 교육</div><div class="chips" id="sl-vet"></div></div>
  <div class="slicer search"><div class="lbl">검색</div><input id="search" placeholder="이름 검색..."></div>
</div>

<div class="kpis">
  <div class="kpi k1"><div class="ic">👥</div><div class="val" id="kp1">0</div><div class="cap">선택 인원</div></div>
  <div class="kpi k2"><div class="ic">🎓</div><div class="val" id="kp2">0%</div><div class="cap">Basic 이수율</div></div>
  <div class="kpi k3"><div class="ic">🏅</div><div class="val" id="kp3">0%</div><div class="cap">Veteran 이수율</div></div>
  <div class="kpi k4"><div class="ic">⚙️</div><div class="val" id="kp4">0</div><div class="cap">Engineer 인원</div></div>
</div>

<div class="grid">
  <div class="card"><h3>직급별 인원</h3><div class="cw"><canvas id="cPos"></canvas></div></div>
  <div class="card"><h3>교육과정 이수 현황</h3><div class="cw"><canvas id="cEdu"></canvas></div></div>
  <div class="card"><h3>직무별 인원</h3><div class="cw"><canvas id="cJob"></canvas></div></div>
</div>

<div class="tablecard">
  <h3>상세 명단 (<span id="tblCnt">0</span>명)</h3>
  <div class="tw"><table>
    <thead><tr><th>#</th><th>이름</th><th>입사일</th><th>경력</th><th>직급</th><th>직무</th><th>Basic</th><th>Veteran</th><th>비고</th></tr></thead>
    <tbody id="tbody"><tr><td colspan="9" class="empty">⏳ 데이터 불러오는 중...</td></tr></tbody>
  </table></div>
</div>

<script>
const SHEET_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vTr_0-rtwnz47XAWsHUJT7acg5vgrVPe4Gk17ArnsWfnV_30Y4BJXIBRZZ1bAw33TUsqDmoz0LgzbOP/pub?gid=0&single=true&output=csv';
let DATA = [];
const F = {pos:'전체', job:'전체', basic:'전체', vet:'전체', q:''};
Chart.defaults.color = '#a0a0c0';
Chart.defaults.font.family = "'Segoe UI','Malgun Gothic',sans-serif";
const PAL = ['#6c5ce7','#00cec9','#fd79a8','#fdcb6e','#a29bfe','#55efc4'];

function parseCSV(text) {
  const lines = text.trim().split('\n');
  const headers = lines[0].split(',').map(h => h.trim().replace(/"/g,'').toLowerCase());
  return lines.slice(1).map(line => {
    const vals = []; let cur = '', inQ = false;
    for (const ch of line) {
      if (ch === '"') { inQ = !inQ; }
      else if (ch === ',' && !inQ) { vals.push(cur.trim()); cur = ''; }
      else cur += ch;
    }
    vals.push(cur.trim());
    const obj = {};
    headers.forEach((h, i) => obj[h] = (vals[i] || '').replace(/"/g,''));
    return obj;
  }).filter(d => d.name || d['이름']);
}

async function loadData() {
  const btn = document.getElementById('refreshBtn');
  const status = document.getElementById('status');
  btn.disabled = true; btn.textContent = '⏳ 불러오는 중...';
  status.className = 'status'; status.textContent = '구글 시트에서 데이터 불러오는 중...';
  try {
    const res = await fetch(SHEET_URL + '&t=' + Date.now());
    const text = await res.text();
    const rows = parseCSV(text);
    const colMap = {
      no:['no','번호'], name:['name','이름','성명'], join:['join','입사일'],
      exp:['exp','경력'], pos:['pos','직급','position'], job:['job','직무'],
      basic:['basic','basic교육'], vet:['vet','veteran','veteran교육'], note:['note','비고']
    };
    DATA = rows.map(row => {
      const mapped = {};
      for (const [key, aliases] of Object.entries(colMap)) {
        const found = aliases.find(a => row[a] !== undefined);
        mapped[key] = found ? String(row[found]).trim() : '';
      }
      return mapped;
    }).filter(d => d.name);
    const now = new Date().toLocaleString('ko-KR');
    status.className = 'status ok';
    status.textContent = '✅ 마지막 업데이트: ' + now + ' · ' + DATA.length + '명';
    rebuildFilters(); render();
  } catch(err) {
    status.className = 'status err';
    status.textContent = '❌ 데이터를 불러오지 못했습니다.';
    document.getElementById('tbody').innerHTML = '<tr><td colspan="9" class="empty">데이터 로드 실패</td></tr>';
  }
  btn.disabled = false; btn.textContent = '🔄 새로고침';
}

function uniq(k) { return ['전체', ...Array.from(new Set(DATA.map(d => d[k]).filter(Boolean)))]; }
function buildChips(id, key) {
  const box = document.getElementById(id); box.innerHTML = '';
  uniq(key).forEach(v => {
    const c = document.createElement('div');
    c.className = 'chip' + (v === '전체' ? ' active' : ''); c.textContent = v;
    c.onclick = () => { F[key]=v; [...box.children].forEach(x=>x.classList.remove('active')); c.classList.add('active'); render(); };
    box.appendChild(c);
  });
}
function rebuildFilters() {
  F.pos='전체'; F.job='전체'; F.basic='전체'; F.vet='전체'; F.q='';
  document.getElementById('search').value = '';
  buildChips('sl-pos','pos'); buildChips('sl-job','job');
  buildChips('sl-basic','basic'); buildChips('sl-vet','vet');
}
document.getElementById('search').addEventListener('input', e => { F.q = e.target.value.toLowerCase(); render(); });
function filt() {
  return DATA.filter(d =>
    (F.pos==='전체'||d.pos===F.pos) && (F.job==='전체'||d.job===F.job) &&
    (F.basic==='전체'||d.basic===F.basic) && (F.vet==='전체'||d.vet===F.vet) &&
    (F.q===''||d.name.toLowerCase().includes(F.q))
  );
}
function tagCls(v) { return v==='이수완료'?'t-done':v==='진행중'?'t-prog':'t-na'; }
function animVal(el, target, suffix, dec) {
  const start = parseFloat(el.dataset.v || 0); const t0 = performance.now();
  function step(t) {
    const p = Math.min((t-t0)/600,1); const cur = start+(target-start)*(1-Math.pow(1-p,3));
    el.textContent = (dec?cur.toFixed(1):Math.round(cur))+(suffix||'');
    if (p<1) requestAnimationFrame(step); else el.dataset.v = target;
  }
  requestAnimationFrame(step);
}
let charts = {};
function donut(id, labels, vals) {
  const ctx = document.getElementById(id);
  if (charts[id]) { charts[id].data.labels=labels; charts[id].data.datasets[0].data=vals; charts[id].update(); return; }
  charts[id] = new Chart(ctx, {type:'doughnut',data:{labels,datasets:[{data:vals,backgroundColor:PAL,borderColor:'rgba(0,0,0,.2)',borderWidth:2,hoverOffset:10}]},
    options:{cutout:'62%',plugins:{legend:{position:'bottom',labels:{padding:14,usePointStyle:true,pointStyle:'circle'}}},animation:{animateScale:true}}});
}
function bars(id, labels, datasets) {
  const ctx = document.getElementById(id);
  if (charts[id]) { charts[id].data.labels=labels; charts[id].data.datasets=datasets; charts[id].update(); return; }
  charts[id] = new Chart(ctx, {type:'bar',data:{labels,datasets},
    options:{plugins:{legend:{position:'bottom',labels:{usePointStyle:true,pointStyle:'circle'}}},
    scales:{x:{stacked:true,grid:{color:'rgba(255,255,255,.05)'}},y:{stacked:true,grid:{color:'rgba(255,255,255,.05)'},ticks:{precision:0}}}}});
}
function cnt(arr, key, val) { return arr.filter(d => d[key]===val).length; }
function render() {
  const f = filt();
  document.getElementById('totRec').textContent = DATA.length;
  animVal(document.getElementById('kp1'), f.length, '', false);
  const bd = cnt(f,'basic','이수완료');
  animVal(document.getElementById('kp2'), f.length?bd/f.length*100:0, '%', true);
  const vTarget = f.filter(d => d.vet!=='비대상');
  animVal(document.getElementById('kp3'), vTarget.length?cnt(vTarget,'vet','이수완료')/vTarget.length*100:0, '%', true);
  animVal(document.getElementById('kp4'), cnt(f,'pos','Engineer'), '', false);
  const posL = Array.from(new Set(DATA.map(d=>d.pos).filter(Boolean)));
  donut('cPos', posL, posL.map(p=>cnt(f,'pos',p)));
  const jobL = Array.from(new Set(DATA.map(d=>d.job).filter(Boolean)));
  donut('cJob', jobL, jobL.map(j=>cnt(f,'job',j)));
  bars('cEdu', ['Basic','Veteran'], [
    {label:'이수완료',data:[cnt(f,'basic','이수완료'),cnt(f,'vet','이수완료')],backgroundColor:'#00cec9',borderRadius:6},
    {label:'진행중',data:[cnt(f,'basic','진행중'),cnt(f,'vet','진행중')],backgroundColor:'#fdcb6e',borderRadius:6},
    {label:'비대상',data:[cnt(f,'basic','비대상'),cnt(f,'vet','비대상')],backgroundColor:'#636e92',borderRadius:6},
  ]);
  const tb = document.getElementById('tbody'); tb.innerHTML = '';
  document.getElementById('tblCnt').textContent = f.length;
  if (!f.length) { tb.innerHTML='<tr><td colspan="9" class="empty">조건에 맞는 인원이 없습니다</td></tr>'; return; }
  f.forEach((d,i) => {
    const tr = document.createElement('tr');
    tr.innerHTML = `<td>${d.no||i+1}</td><td><b>${d.name}</b></td><td>${d.join}</td><td>${d.exp}</td>
      <td>${d.pos}</td><td>${d.job}</td>
      <td><span class="tag ${tagCls(d.basic)}">${d.basic}</span></td>
      <td><span class="tag ${tagCls(d.vet)}">${d.vet}</span></td>
      <td style="color:var(--muted)">${d.note||'-'}</td>`;
    tb.appendChild(tr);
  });
}
loadData();
</script>
</body>
</html>
