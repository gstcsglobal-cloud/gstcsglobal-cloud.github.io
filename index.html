<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Cdefs%3E%3ClinearGradient id='g' x1='0' y1='0' x2='1' y2='1'%3E%3Cstop offset='0' stop-color='%232dd4bf'/%3E%3Cstop offset='1' stop-color='%23a78bfa'/%3E%3C/linearGradient%3E%3C/defs%3E%3Cpolygon points='50,4 92,27 92,73 50,96 8,73 8,27' fill='url(%23g)'/%3E%3Ctext x='50' y='66' font-size='46' font-weight='900' text-anchor='middle' fill='%230a1420' font-family='Segoe UI,sans-serif'%3EG%3C/text%3E%3C/svg%3E">
<script src="https://gstcsglobal-cloud.github.io/assets/core.js"></script>
<title>GST 통합 대시보드</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg1:#14142f;--bg2:#1e1d4d;--line:#3b3a6b;--txt:#e2e8f0;--mut:#94a3b8;
  --accent:#38bdf8;--glass:rgba(255,255,255,0.06);--glassb:rgba(255,255,255,0.13);
}
html,body{height:100%;overflow:hidden}
body{font-family:'Segoe UI','Malgun Gothic',sans-serif;color:var(--txt);
  background:linear-gradient(135deg,#14142f,#1e1d4d);display:flex;flex-direction:column}
body.theme-burgundy{background:linear-gradient(135deg,#1a0813,#2d0b1e)}
body.theme-burgundy .topbar,body.theme-burgundy .tabbar{background:rgba(26,8,19,.85)}
body.theme-light{background:linear-gradient(135deg,#f1f5f9,#e2e8f0);color:#0f172a}
body.theme-light .topbar,body.theme-light .tabbar{background:rgba(241,245,249,.9);border-color:rgba(15,23,42,.1)}
body.theme-light .tab{color:#64748b}
body.theme-light .tab:hover{color:#0f172a}
body.theme-light .tab.active{color:#2563eb;border-bottom-color:#2563eb}
body.theme-light .tb-btn{background:rgba(15,23,42,.05);border-color:rgba(15,23,42,.12);color:#0f172a}
body.theme-light .brand .tag{color:#64748b}
body.theme-light .frame-wrap{background:#f1f5f9}
body.theme-light .frame-wrap iframe{background:#f1f5f9}

/* Slate — 새 기본 테마: 단일 표면 + 단일 액센트 */
body.theme-slate{background:#0B0F14;color:#E6EDF3}
body.theme-slate .topbar,body.theme-slate .tabbar{background:#0E141C;border-color:rgba(151,170,196,.10)}
body.theme-slate .brand .logo{background:linear-gradient(90deg,#2DD4BF,#E6EDF3);
  -webkit-background-clip:text;background-clip:text}
body.theme-slate .brand .tag{color:#5E6D80}
body.theme-slate .tab{color:#8B98A9}
body.theme-slate .tab:hover{color:#E6EDF3}
body.theme-slate .tab.active{color:#2DD4BF;border-bottom-color:#2DD4BF}
body.theme-slate .tb-btn{background:transparent;border-color:rgba(151,170,196,.16);color:#8B98A9;border-radius:8px}
body.theme-slate .tb-btn:hover{background:#16202C;color:#E6EDF3}
body.theme-slate .tb-btn.logout:hover{border-color:#e66767;color:#e66767}
body.theme-slate .frame-wrap{background:#0B0F14}
body.theme-slate .frame-wrap iframe{background:#0B0F14}
body.theme-slate .spinner{border-color:rgba(151,170,196,.16);border-top-color:#2DD4BF}

/* 상단 바 */
.topbar{display:flex;align-items:center;justify-content:space-between;padding:12px 24px;
  background:rgba(20,20,47,.85);backdrop-filter:blur(14px);border-bottom:1px solid var(--line);flex-shrink:0}
.brand{display:flex;align-items:center;gap:12px}
.brand .logo{font-size:22px;font-weight:900;background:linear-gradient(90deg,#00cec9,#6c5ce7,#fd79a8);
  -webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent;letter-spacing:-1px}
.brand .tag{font-size:12px;color:var(--mut)}
.topbar-right{display:flex;align-items:center;gap:10px}
.tb-btn{display:inline-flex;align-items:center;gap:6px;background:var(--glass);border:1px solid var(--glassb);color:var(--txt);
  padding:8px 14px;border-radius:20px;font-size:12px;font-weight:700;cursor:pointer;transition:all .2s;text-decoration:none}
.tb-btn:hover{background:rgba(255,255,255,.12)}
.tb-btn.logout:hover{border-color:#fb7185;color:#fda4af}

/* 탭 바 */
.tabbar{display:flex;gap:2px;padding:0 24px;background:rgba(20,20,47,.6);
  border-bottom:2px solid var(--line);flex-shrink:0;overflow-x:auto}
.tabbar::-webkit-scrollbar{height:0}
.tab{padding:13px 22px;font-size:14px;font-weight:700;color:var(--mut);cursor:pointer;
  border:none;background:transparent;border-bottom:3px solid transparent;transition:color .2s,border-color .25s cubic-bezier(.4,0,.2,1);white-space:nowrap;position:relative;top:2px}
.tab:hover{color:var(--txt)}
.tab.active{color:var(--accent);border-bottom-color:var(--accent)}
.tab .ic{margin-right:7px;display:inline-flex;vertical-align:-2px}

/* iframe 영역 */
.frame-wrap{flex:1;position:relative;background:#16163a}
.frame-wrap iframe{position:absolute;inset:0;width:100%;height:100%;border:none;display:none;background:#16163a}
.frame-wrap iframe.active{display:block;animation:frameIn .3s ease}
@keyframes frameIn{from{opacity:.3}to{opacity:1}}
.frame-loading{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;z-index:1;pointer-events:none}
.spinner{width:36px;height:36px;border:3px solid var(--glassb);border-top-color:var(--accent);border-radius:50%;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}

/* 로그인 */
#login{position:fixed;inset:0;z-index:9999;background:linear-gradient(-45deg,#0f0c29,#302b63,#24243e,#1a1a2e);
  background-size:400% 400%;animation:grad 18s ease infinite;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:8px}
#login.hidden{display:none}
@keyframes grad{0%{background-position:0% 50%}50%{background-position:100% 50%}100%{background-position:0% 50%}}
.login-logo{font-size:38px;font-weight:900;background:linear-gradient(90deg,#00cec9,#6c5ce7,#fd79a8);
  -webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent;margin-bottom:6px;letter-spacing:-2px}
.login-box{background:rgba(255,255,255,0.07);border:1px solid rgba(255,255,255,0.15);border-radius:24px;padding:36px 40px;backdrop-filter:blur(14px);text-align:center;min-width:300px}
.login-box .lock{font-size:40px;margin-bottom:14px}
.login-box .ltitle{font-size:16px;font-weight:700;margin-bottom:18px}
.login-box input{width:100%;background:rgba(255,255,255,0.08);border:1px solid rgba(255,255,255,0.18);border-radius:30px;padding:13px 20px;color:#f5f6fa;font-size:15px;outline:none;text-align:center}
.login-box input:focus{border-color:#6c5ce7}
.login-box button{width:100%;margin-top:14px;background:linear-gradient(90deg,#6c5ce7,#00cec9);border:none;border-radius:30px;padding:13px;color:#fff;font-size:15px;font-weight:700;cursor:pointer}
.login-err{color:#fd79a8;font-size:13px;margin-top:12px;min-height:18px;font-weight:600}

@media(max-width:768px){
  .brand .tag{display:none}
  .brand .logo{font-size:17px}
  .tab{padding:11px 12px;font-size:12px}
  .tab .ic{margin-right:4px}
  .topbar{padding:8px 12px;gap:6px}
  .tabbar{padding:0 8px}
  .tb-btn{padding:7px 10px;font-size:11px}
  .tb-btn span{display:none}
  .tb-btn.logout span{display:inline}
}
</style>
</head>
<body>

<!-- 로그인 -->
<div id="login">
  <div class="login-logo">GST Dashboard</div>
  <div class="login-box">
    <div class="lock"><svg width="34" height="34" viewBox="0 0 24 24" fill="none" stroke="#818cf8" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg></div>
    <div class="ltitle" id="lgTitle">비밀번호를 입력하세요</div>
    <input type="password" id="pw" placeholder="비밀번호" autocomplete="off">
    <button onclick="doLogin()" id="lgBtn">로그인</button>
    <div class="login-err" id="lgErr"></div>
  </div>
</div>

<!-- 상단 바 -->
<div class="topbar">
  <div class="brand">
    <span class="logo" data-lock>Service Operation Dashboard</span>
    <span class="tag" id="brandTag" data-lock>By CS Global Team</span>
  </div>
  <div class="topbar-right">
    <button class="tb-btn" onclick="refreshActive()" id="refreshBtn"><svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12a9 9 0 1 1-2.6-6.4"/><path d="M21 3v6h-6"/></svg> <span id="refreshLabel">새로고침</span></button>
    <button class="tb-btn" onclick="exportActive()" id="exportBtn"><svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M6 9V2h12v7"/><path d="M6 18H4a2 2 0 0 1-2-2v-5a2 2 0 0 1 2-2h16a2 2 0 0 1 2 2v5a2 2 0 0 1-2 2h-2"/><rect x="6" y="14" width="12" height="8"/></svg> <span id="exportLabel">내보내기</span></button>
    <button class="tb-btn" onclick="shareLink()" id="shareBtn"><svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M10 13a5 5 0 0 0 7.5.5l3-3a5 5 0 0 0-7-7l-1.7 1.7"/><path d="M14 11a5 5 0 0 0-7.5-.5l-3 3a5 5 0 0 0 7 7l1.7-1.7"/></svg> <span id="shareLabel">공유</span></button>
    <button class="tb-btn" onclick="cycleTheme()"><svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 3a9 9 0 1 0 9 9c0-.5-.4-1-1-1h-2a3 3 0 0 1-3-3V6c0-.6-.4-1-1-1z"/><circle cx="7.5" cy="10.5" r="1"/><circle cx="10.5" cy="6.5" r="1"/><circle cx="15" cy="15.5" r="1"/></svg> <span id="themeLabel">Dark</span></button>
    <button class="tb-btn" onclick="cycleLang()"><svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="12" cy="12" r="10"/><path d="M2 12h20M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/></svg> <span id="langLabel">KO</span></button>
    <button class="tb-btn logout" onclick="doLogout()" id="logoutBtn">로그아웃</button>
  </div>
</div>

<!-- 탭 바 -->
<div class="tabbar" id="tabbar"></div>

<!-- iframe 영역 -->
<div class="frame-wrap" id="frameWrap">
  <div class="frame-loading" id="frameLoading"><div class="spinner"></div></div>
</div>

<script>
const BASE='https://gstcsglobal-cloud.github.io';

// 탭 정의 (순서대로)
const SVG={
  home:'<svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 9.5 12 3l9 6.5V21a1 1 0 0 1-1 1h-5v-7h-6v7H4a1 1 0 0 1-1-1z"/></svg>',
  report:'<svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 3v18h18"/><rect x="7" y="11" width="3" height="7"/><rect x="12" y="7" width="3" height="11"/><rect x="17" y="4" width="3" height="14"/></svg>',
  hr:'<svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>',
  scrubber:'<svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><path d="M2 12h20M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/></svg>',
  pm:'<svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><rect x="3" y="4" width="18" height="18" rx="2"/><path d="M16 2v4M8 2v4M3 10h18"/></svg>',
  fault:'<svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M10.29 3.86 1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/><path d="M12 9v4M12 17h.01"/></svg>',
  material:'<svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linejoin="round"><path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"/><path d="M3.27 6.96 12 12.01l8.73-5.05M12 22.08V12"/></svg>'
};
const TABS=[
  {id:'home',    path:'/home/',     ko:'홈',        en:'Home',         zh:'主页',   ja:'ホーム'},
  {id:'report',  path:'/report/',   ko:'주간 현황', en:'Weekly',       zh:'周现况', ja:'週間現況'},
  {id:'hr',      path:'/hr/',       ko:'인원 현황', en:'Workforce',    zh:'人员',   ja:'人員'},
  {id:'scrubber',path:'/scrubber/', ko:'설치 현황', en:'Installation', zh:'安装',   ja:'設置'},
  {id:'pm',      path:'/pm/',       ko:'PM 점검',   en:'PM Schedule',  zh:'PM点检', ja:'PM点検'},
  {id:'fault',   path:'/fault/',    ko:'고장 분석', en:'Fault',        zh:'故障',   ja:'故障'},
  {id:'material',path:'/material/', ko:'자재 실적', en:'Material',     zh:'材料',   ja:'資材'}
];

const L={
  ko:{tag:'By CS Global Team',login:'비밀번호를 입력하세요',ph:'비밀번호',btn:'로그인',wrong:'비밀번호가 올바르지 않습니다',logout:'로그아웃',refresh:'새로고침',exp:'내보내기',share:'공유',copied:'복사됨!'},
  en:{tag:'By CS Global Team',login:'Enter password',ph:'Password',btn:'Login',wrong:'Incorrect password',logout:'Logout',refresh:'Refresh',exp:'Export',share:'Share',copied:'Copied!'},
  zh:{tag:'By CS Global Team',login:'请输入密码',ph:'密码',btn:'登录',wrong:'密码不正确',logout:'登出',refresh:'刷新',exp:'导出',share:'分享',copied:'已复制!'},
  ja:{tag:'By CS Global Team',login:'パスワードを入力',ph:'パスワード',btn:'ログイン',wrong:'パスワードが正しくありません',logout:'ログアウト',refresh:'更新',exp:'エクスポート',share:'共有',copied:'コピー済み!'}
};
let LANG='ko';
try{ const sl=sessionStorage.getItem('gst_lang'); if(sl&&L[sl])LANG=sl; else if(window.name && L[window.name]) LANG=window.name; }catch(e){}

const frames={}; // id -> iframe element
let activeTab=null;

function lt(k){return (L[LANG]||L.ko)[k]||k;}

function applyLang(){
  {const _bt=document.getElementById('brandTag'); if(_bt&&!_bt.hasAttribute('data-lock'))_bt.textContent=lt('tag');}
  document.getElementById('lgTitle').textContent=lt('login');
  document.getElementById('pw').placeholder=lt('ph');
  document.getElementById('lgBtn').textContent=lt('btn');
  document.getElementById('logoutBtn').textContent=lt('logout');
  document.getElementById('refreshLabel').textContent=lt('refresh');
  document.getElementById('exportLabel').textContent=lt('exp');
  document.getElementById('shareLabel').textContent=lt('share');
  document.getElementById('langLabel').textContent=LANG.toUpperCase();
  // 탭 이름 갱신
  document.querySelectorAll('.tab').forEach(el=>{
    const tab=TABS.find(t=>t.id===el.dataset.id);
    if(tab)el.querySelector('.tab-label').textContent=tab[LANG]||tab.ko;
  });
}


// ===== 테마 (모든 iframe에 전파) =====
const THEMES=[{key:'slate',label:'Slate'},{key:'default',label:'Navy'},{key:'burgundy',label:'Burgundy'},{key:'light',label:'Light'}];
let THEME='slate';
try{const s=sessionStorage.getItem('gst_theme');if(s&&THEMES.find(t=>t.key===s))THEME=s;}catch(e){}

function cycleTheme(){
  const i=THEMES.findIndex(t=>t.key===THEME);
  THEME=THEMES[(i+1)%THEMES.length].key;
  try{sessionStorage.setItem('gst_theme',THEME);}catch(e){}
  applyTheme();
  broadcast({type:'gst-theme',theme:THEME});
}
function applyTheme(){
  document.getElementById('themeLabel').textContent=THEMES.find(t=>t.key===THEME).label;
  document.body.className = THEME==='default' ? '' : 'theme-'+THEME;
}
// 모든 iframe에 메시지 전송
function broadcast(msg){
  Object.values(frames).forEach(f=>{ try{f.contentWindow.postMessage(msg,'*');}catch(e){} });
}

// ===== URL 상태 (탭+필터) 공유 =====
const TAB_STATE={};
let PENDING_STATE=null;
function parseHash(){
  const p=new URLSearchParams(location.hash.slice(1));
  return {tab:p.get('tab'), f:p.get('f')};
}
function updateHash(){
  try{
    const p=new URLSearchParams();
    if(activeTab)p.set('tab',activeTab);
    if(TAB_STATE[activeTab])p.set('f',TAB_STATE[activeTab]);
    history.replaceState(null,'','#'+p.toString());
  }catch(e){}
}
window.addEventListener('message',e=>{
  const d=e.data||{};
  if(d.type==='gst-state'){ TAB_STATE[activeTab]=d.state||''; updateHash(); }
});
function shareLink(){
  navigator.clipboard.writeText(location.href).then(()=>{
    const s=document.getElementById('shareLabel'); const o=s.textContent;
    s.textContent=lt('copied'); setTimeout(()=>s.textContent=o,1500);
  });
}

// 홈 카드 클릭 → 탭 전환 수신
window.addEventListener('message',e=>{
  const d=e.data||{};
  if(d.type==='gst-goto' && d.tab) switchTab(d.tab);
});
// 현재 탭 PDF/인쇄 내보내기
function exportActive(){
  if(activeTab && frames[activeTab]){
    try{frames[activeTab].contentWindow.print();}catch(e){window.print();}
  }
}
// 현재 탭 새로고침
function refreshActive(){
  if(activeTab && frames[activeTab]){
    frames[activeTab].contentWindow.location.reload();
  }
}

function cycleLang(){
  const order=['ko','en','zh','ja'];
  LANG=order[(order.indexOf(LANG)+1)%4];
  try{window.name=LANG;sessionStorage.setItem('gst_lang',LANG);}catch(e){}
  applyLang();
  broadcast({type:'gst-lang',lang:LANG});
}

function buildTabs(){
  const bar=document.getElementById('tabbar');
  bar.innerHTML='';
  TABS.forEach(tab=>{
    const b=document.createElement('button');
    b.className='tab'; b.dataset.id=tab.id;
    b.innerHTML=`<span class="ic">${SVG[tab.id]||''}</span><span class="tab-label">${tab[LANG]||tab.ko}</span>`;
    b.onclick=()=>switchTab(tab.id);
    bar.appendChild(b);
  });
}

function switchTab(id){
  if(activeTab===id)return;
  activeTab=id;
  // 탭 하이라이트
  document.querySelectorAll('.tab').forEach(el=>el.classList.toggle('active',el.dataset.id===id));
  // iframe 없으면 생성 (지연 로딩)
  if(!frames[id]){
    const tab=TABS.find(t=>t.id===id);
    const f=document.createElement('iframe');
    f.src=BASE+tab.path+((PENDING_STATE&&PENDING_STATE.tab===id&&PENDING_STATE.f)?('?f='+PENDING_STATE.f):'');
    f.dataset.id=id;
    f.addEventListener('load',()=>{try{f.contentWindow.postMessage({type:'gst-theme',theme:THEME},'*');f.contentWindow.postMessage({type:'gst-lang',lang:LANG},'*');}catch(e){}});
    document.getElementById('frameWrap').appendChild(f);
    frames[id]=f;
  }
  // 표시 전환
  Object.values(frames).forEach(f=>f.classList.remove('active'));
  frames[id].classList.add('active');
  document.getElementById('frameLoading').style.display='none';
  // 현재 탭 기억
  try{sessionStorage.setItem('gst_tab',id);}catch(e){}
  updateHash();
}

// 로그인
async function doLogin(){
  const v=document.getElementById('pw').value;
  if(await GST.checkPw(v)){
    try{sessionStorage.setItem('gst_auth','1');}catch(e){}
    document.getElementById('login').classList.add('hidden');
    start();
  }else{
    document.getElementById('lgErr').textContent=lt('wrong');
    document.getElementById('pw').value='';
  }
}
function doLogout(){
  try{sessionStorage.removeItem('gst_auth');}catch(e){}
  location.reload();
}

function start(){
  buildTabs();
  applyLang();
  applyTheme();
  // iframe이 직접 sessionStorage에서 테마를 읽을 수 있도록 현재 테마 저장
  try{sessionStorage.setItem('gst_theme',THEME);}catch(e){}
  // 마지막 본 탭 or 첫 탭
  let init=TABS[0].id;
  try{const saved=sessionStorage.getItem('gst_tab');if(saved&&TABS.find(t=>t.id===saved))init=saved;}catch(e){}
  const hs=parseHash();
  if(hs.tab&&TABS.find(t=>t.id===hs.tab)){ init=hs.tab; if(hs.f)PENDING_STATE={tab:hs.tab,f:hs.f}; }
  switchTab(init);
}


// 키보드 단축키: 1~6 탭 전환
document.addEventListener('keydown',e=>{
  if(e.target.tagName==='INPUT'||e.target.tagName==='SELECT'||e.target.tagName==='TEXTAREA')return;
  const n=parseInt(e.key);
  if(n>=1 && n<=TABS.length) switchTab(TABS[n-1].id);
});

// 초기화
(function(){
  let authed=false;
  try{authed=sessionStorage.getItem('gst_auth')==='1';}catch(e){}
  if(authed){
    document.getElementById('login').classList.add('hidden');
    start();
  }else{
    applyLang();
    const pw=document.getElementById('pw');
    pw.addEventListener('keydown',e=>{if(e.key==='Enter')doLogin();});
    setTimeout(()=>pw.focus(),100);
  }
})();
</script>
</body>
