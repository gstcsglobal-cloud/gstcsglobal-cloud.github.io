<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GST 대시보드</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
:root {
  --bg1:#0f0c29; --bg2:#302b63; --bg3:#24243e;
  --glass:rgba(255,255,255,0.07); --glassb:rgba(255,255,255,0.15);
  --txt:#f5f6fa; --muted:#a0a0c0;
}
body {
  font-family:'Segoe UI','Malgun Gothic',sans-serif; color:var(--txt);
  background:linear-gradient(-45deg,var(--bg1),var(--bg2),var(--bg3),#1a1a2e);
  background-size:400% 400%; animation:grad 18s ease infinite;
  min-height:100vh; display:flex; flex-direction:column; align-items:center; justify-content:center;
}
@keyframes grad{0%{background-position:0% 50%}50%{background-position:100% 50%}100%{background-position:0% 50%}}
.logo { font-size:42px; font-weight:900;
  background:linear-gradient(90deg,#00cec9,#6c5ce7,#fd79a8);
  -webkit-background-clip:text; background-clip:text; -webkit-text-fill-color:transparent;
  margin-bottom:8px; letter-spacing:-2px; }
.sub { color:var(--muted); font-size:15px; margin-bottom:60px; }
.cards { display:flex; gap:28px; flex-wrap:wrap; justify-content:center; }
.card {
  background:var(--glass); border:1px solid var(--glassb);
  border-radius:28px; padding:44px 48px; text-align:center;
  cursor:pointer; text-decoration:none; color:var(--txt);
  transition:transform .3s, box-shadow .3s; backdrop-filter:blur(14px);
  min-width:240px;
}
.card:hover { transform:translateY(-8px); box-shadow:0 20px 60px rgba(0,0,0,.4); }
.card .icon { font-size:52px; margin-bottom:16px; }
.card .title { font-size:20px; font-weight:800; margin-bottom:8px; }
.card .desc { font-size:13px; color:var(--muted); line-height:1.6; }
.card.c1 { border-color:rgba(108,92,231,.4); }
.card.c1:hover { box-shadow:0 20px 60px rgba(108,92,231,.3); }
.card.c2 { border-color:rgba(0,206,201,.4); }
.card.c2:hover { box-shadow:0 20px 60px rgba(0,206,201,.3); }
</style>
</head>
<body>
  <div class="logo">GST Dashboard</div>
  <div class="sub">원하는 대시보드를 선택하세요</div>
  <div class="cards">
    <a href="./hr/" class="card c1">
      <div class="icon">👥</div>
      <div class="title">인원 현황</div>
      <div class="desc">엔지니어 교육 · 직급 · 직무<br>인터랙티브 분석</div>
    </a>
    <a href="./scrubber/" class="card c2">
      <div class="icon">🌐</div>
      <div class="title">설치 현황</div>
      <div class="desc">글로벌 스크러버 설치<br>통합 모니터링</div>
    </a>
  </div>
</body>
</html>
