<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Global CS Dashboard</title>
<style>
/* (디자인 CSS 영역은 기존과 100% 동일하므로 공간 절약을 위해 생략합니다. 기존 CSS 코드를 그대로 유지하세요) */
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg1:#0f172a;--bg2:#1e293b;--line:#334155;--txt:#e2e8f0;--mut:#94a3b8;--accent:#38bdf8;--glass:rgba(255,255,255,0.06);--glassb:rgba(255,255,255,0.13);}
html,body{height:100%;overflow:hidden}
body{font-family:'Segoe UI','Malgun Gothic',sans-serif;color:var(--txt);background:linear-gradient(135deg,#0a1420,#13232d);display:flex;flex-direction:column}
.topbar{display:flex;align-items:center;justify-content:space-between;padding:12px 24px;background:rgba(15,23,42,.85);backdrop-filter:blur(14px);border-bottom:1px solid var(--line);flex-shrink:0}
.brand{display:flex;align-items:center;gap:12px}.brand .logo{font-size:22px;font-weight:900;background:linear-gradient(90deg,#00cec9,#6c5ce7,#fd79a8);-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent;letter-spacing:-1px}
.brand .tag{font-size:12px;color:var(--mut)}.topbar-right{display:flex;align-items:center;gap:10px}
.tb-btn{background:var(--glass);border:1px solid var(--glassb);color:var(--txt);padding:8px 14px;border-radius:20px;font-size:12px;font-weight:700;cursor:pointer;transition:all .2s;text-decoration:none}
.tb-btn:hover{background:rgba(255,255,255,.12)}.tb-btn.logout:hover{border-color:#fb7185;color:#fda4af}
.tabbar{display:flex;gap:2px;padding:0 24px;background:rgba(15,23,42,.6);border-bottom:2px solid var(--line);flex-shrink:0;overflow-x:auto}
.tabbar::-webkit-scrollbar{height:0}.tab{padding:13px 22px;font-size:14px;font-weight:700;color:var(--mut);cursor:pointer;border:none;background:transparent;border-bottom:3px solid transparent;transition:all .2s;white-space:nowrap;position:relative;top:2px}
.tab:hover{color:var(--txt)}.tab.active{color:var(--accent);border-bottom-color:var(--accent)}.tab .ic{margin-right:7px;display:inline-flex;vertical-align:-2px}
.frame-wrap{flex:1;position:relative;background:#0f172a}.frame-wrap iframe{position:absolute;inset:0;width:100%;height:100%;border:none;display:none;background:#0f172a}.frame-wrap iframe.active{display:block}
.frame-loading{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;z-index:1;pointer-events:none}.spinner{width:36px;height:36px;border:3px solid var(--glassb);border-top-color:var(--accent);border-radius:50%;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
#login{position:fixed;inset:0;z-index:9999;background:linear-gradient(-45deg,#0f0c29,#302b63,#24243e,#1a1a2e);background-size:400% 400%;animation:grad 18s ease infinite;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:8px}
#login.hidden{display:none}@keyframes grad{0%{background-position:0% 50%}50%{background-position:100% 50%}100%{background-position:0% 50%}}
.login-logo{font-size:38px;font-weight:900;background:linear-gradient(90deg,#00cec9,#6c5ce7,#fd79a8);-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent;margin-bottom:6px;letter-spacing:-2px}
.login-box{background:rgba(255,255,255,0.07);border:1px solid rgba(255,255,255,0.15);border-radius:24px;padding:36px 40px;backdrop-filter:blur(14px);text-align:center;min-width:300px}
.login-box .lock{font-size:40px;margin-bottom:14px}.login-box .ltitle{font-size:16px;font-weight:700;margin-bottom:18px}
.login-box input{width:100%;background:rgba(255,255,255,0.08);border:1px solid rgba(255,255,255,0.18);border-radius:30px;padding:13px 20px;color:#f5f6fa;font-size:15px;outline:none;text-align:center}
.login-box input:focus{border-color:#6c5ce7}.login-box button{width:100%;margin-top:14px;background:linear-gradient(90deg,#6c5ce7,#00cec9);border:none;border-radius:30px;padding:13px;color:#fff;font-size:15px;font-weight:700;cursor:pointer}
.login-err{color:#fd79a8;font-size:13px;margin-top:12px;min-height:18px;font-weight:600}
</style>
</head>
<body>

<!-- 로그인 대시보드 구조 레이아웃 -->
<div id="login">
  <div class="login-logo">Global CS Dashboard</div>
  <div class="login-box">
    <div class="lock">🔒</div>
    <div class="ltitle" id="lgTitle">비밀번호를 입력하세요</div>
    <input type="password" id="pw" placeholder="비밀번호" autocomplete="off">
    <button onclick="doLogin()" id="lgBtn">로그인</button>
    <div class="login-err" id="lgErr"></div>
  </div>
</div>

<div class="topbar">
  <div class="brand">
    <span class="logo">Global CS Dashboard</span>
    <span class="tag" id="brandTag">Global Standard Technology</span>
  </div>
  <div class="topbar-right">
    <button class="tb-btn" onclick="refreshActive()" id="refreshBtn">🔄 <span id="refreshLabel">새로고침</span></button>
    <button class="tb-btn" onclick="exportActive()" id="exportBtn">🖨️ <span id="exportLabel">내보내기</span></button>
    <button class="tb-btn" onclick="cycleTheme()">🎨 <span id="themeLabel">Dark</span></button>
    <button class="tb-btn" onclick="cycleLang()">🌐 <span id="langLabel">KO</span></button>
    <button class="tb-btn logout" onclick="doLogout()" id="logoutBtn">로그아웃</button>
  </div>
</div>

<div class="tabbar" id="tabbar"></div>
<div class="frame-wrap" id="frameWrap">
  <div class="frame-loading" id="frameLoading"><div class="spinner"></div></div>
</div>

<!-- 브라우저에 공개되는 안전한 스크립트 (비밀번호와 중요 주소가 완전히 제거됨) -->
<script>
// [보안 반영] PASSWORD 변수와 BASE 변수를 제거했습니다.
let SECURE_BASE = ''; 

async function doLogin() {
  const inputPw = document.getElementById('pw').value;
  const errDiv = document.getElementById('lgErr');
  errDiv.textContent = '';

  try {
    // 브라우저에서 체크하지 않고, Vercel 비밀 서버(/api/check-auth)에 비밀번호가 맞는지 물어봅니다.
    const response = await fetch('/api/check-auth', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ password: inputPw })
    });

    const result = await response.json();

    if (result.success) {
      // 서버가 비밀번호 인증을 승인하고 주소(BASE)를 내려보내 준 경우
      SECURE_BASE = result.data.base;
      sessionStorage.setItem('gst_auth_token', 'AUTHORIZED_SUCCESS');
      sessionStorage.setItem('gst_secure_base', SECURE_BASE);
      
      document.getElementById('login').classList.add('hidden');
      initDashboard(); // 로그인 성공 시 대시보드 로드
    } else {
      errDiv.textContent = '비밀번호가 올바르지 않습니다 / Incorrect';
      document.getElementById('pw').value = '';
    }
  } catch (e) {
    errDiv.textContent = '서버 통신 오류가 발생했습니다.';
  }
}

function initDashboard() {
  console.log("대시보드 초기화 시작 기본 경로:", SECURE_BASE);
  // 여기에 기존에 탭을 그리고 iframe을 생성하던 나머지 로직을 이어서 붙이시면 됩니다.
  // 주소가 필요할 때는 고정 주소 대신 서버가 전달해준 SECURE_BASE 변수를 조합해 사용하세요.
}

// 자동 로그인 체크 (세션 저장소 활용)
window.onload = function() {
  const token = sessionStorage.getItem('gst_auth_token');
  const savedBase = sessionStorage.getItem('gst_secure_base');
  if (token === 'AUTHORIZED_SUCCESS' && savedBase) {
    SECURE_BASE = savedBase;
    document.getElementById('login').classList.add('hidden');
    initDashboard();
  }
  
  document.getElementById('pw').addEventListener('keydown', e => {
    if (e.key === 'Enter') doLogin();
  });
};

function doLogout() {
  sessionStorage.clear();
  window.location.reload();
}

// 기타 부가 기능들 (테마 전환 등 기존 코드 그대로 유지)
function cycleTheme() { /* 기존 코드 유지 */ }
function cycleLang() { /* 기존 코드 유지 */ }
function refreshActive() { /* 기존 코드 유지 */ }
function exportActive() { /* 기존 코드 유지 */ }
</script>
</body>
</html>
