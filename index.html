<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GST Dashboard</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
:root {
  --bg1:#0f0c29; --bg2:#302b63; --bg3:#24243e;
  --glass:rgba(255,255,255,0.07); --glassb:rgba(255,255,255,0.15);
  --txt:#f5f6fa; --muted:#a0a0c0;
}
body {
  font-family:'Segoe UI','Malgun Gothic',sans-serif; color:var(--txt);
  background:linear-gradient(-45deg,var(--bg1),var(--bg2),var(--bg3),#1a1a2e);
  background-size:400% 400%; animation:grad 18s ease infinite;
  min-height:100vh; display:flex; flex-direction:column; align-items:center; justify-content:center;
  position:relative;
}
@keyframes grad{0%{background-position:0% 50%}50%{background-position:100% 50%}100%{background-position:0% 50%}}

/* 언어 버튼 (우측 상단) */
.lang-wrap{position:absolute;top:24px;right:28px}
.lang-btn{background:var(--glass);border:1px solid var(--glassb);color:var(--txt);
  padding:9px 16px;border-radius:30px;font-size:13px;font-weight:700;cursor:pointer;display:flex;align-items:center;gap:6px;backdrop-filter:blur(10px)}
.lang-btn:hover{background:rgba(255,255,255,.12)}
.lang-dropdown{position:absolute;top:calc(100% + 8px);right:0;
  background:#1a2744;border:1px solid var(--glassb);border-radius:14px;
  padding:6px;z-index:100;min-width:130px;display:none;backdrop-filter:blur(20px)}
.lang-dropdown.open{display:block}
.lang-item{padding:9px 14px;border-radius:10px;cursor:pointer;font-size:13px;font-weight:600}
.lang-item:hover{background:rgba(255,255,255,.08)}

.logo { font-size:42px; font-weight:900;
  background:linear-gradient(90deg,#00cec9,#6c5ce7,#fd79a8);
  -webkit-background-clip:text; background-clip:text; -webkit-text-fill-color:transparent;
  margin-bottom:8px; letter-spacing:-2px; }
.sub { color:var(--muted); font-size:15px; margin-bottom:60px; }
.cards { display:flex; gap:28px; flex-wrap:wrap; justify-content:center; }
.card {
  background:var(--glass); border:1px solid var(--glassb);
  border-radius:28px; padding:44px 48px; text-align:center;
  cursor:pointer; text-decoration:none; color:var(--txt);
  transition:transform .3s, box-shadow .3s; backdrop-filter:blur(14px);
  min-width:240px;
}
.card:hover { transform:translateY(-8px); box-shadow:0 20px 60px rgba(0,0,0,.4); }
.card .icon { font-size:52px; margin-bottom:16px; }
.card .title { font-size:20px; font-weight:800; margin-bottom:8px; }
.card .desc { font-size:13px; color:var(--muted); line-height:1.6; }
.card.c1 { border-color:rgba(108,92,231,.4); }
.card.c1:hover { box-shadow:0 20px 60px rgba(108,92,231,.3); }
.card.c2 { border-color:rgba(0,206,201,.4); }
.card.c2:hover { box-shadow:0 20px 60px rgba(0,206,201,.3); }
.card.c3 { border-color:rgba(251,113,133,.4); }
.card.c3:hover { box-shadow:0 20px 60px rgba(251,113,133,.3); }
.card.c4 { border-color:rgba(251,191,36,.4); }
.card.c4:hover { box-shadow:0 20px 60px rgba(251,191,36,.3); }

/* 로그인 오버레이 */
#loginOverlay{position:fixed;inset:0;z-index:9999;
  background:linear-gradient(-45deg,#0f0c29,#302b63,#24243e,#1a1a2e);
  background-size:400% 400%;animation:grad 18s ease infinite;
  display:flex;flex-direction:column;align-items:center;justify-content:center;gap:8px}
#loginOverlay.hidden{display:none}
.login-logo{font-size:38px;font-weight:900;
  background:linear-gradient(90deg,#00cec9,#6c5ce7,#fd79a8);
  -webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent;
  margin-bottom:6px;letter-spacing:-2px}
.login-box{background:rgba(255,255,255,0.07);border:1px solid rgba(255,255,255,0.15);
  border-radius:24px;padding:36px 40px;backdrop-filter:blur(14px);text-align:center;min-width:300px}
.login-box .lock{font-size:40px;margin-bottom:14px}
.login-box .ltitle{font-size:16px;font-weight:700;margin-bottom:18px;color:#f5f6fa}
.login-box input{width:100%;background:rgba(255,255,255,0.08);border:1px solid rgba(255,255,255,0.18);
  border-radius:30px;padding:13px 20px;color:#f5f6fa;font-size:15px;outline:none;text-align:center;transition:border-color .2s}
.login-box input:focus{border-color:#6c5ce7}
.login-box input::placeholder{color:#a0a0c0}
.login-box button{width:100%;margin-top:14px;background:linear-gradient(90deg,#6c5ce7,#00cec9);
  border:none;border-radius:30px;padding:13px;color:#fff;font-size:15px;font-weight:700;cursor:pointer;transition:opacity .2s}
.login-box button:hover{opacity:.88}
.login-err{color:#fd79a8;font-size:13px;margin-top:12px;min-height:18px;font-weight:600}
</style>
</head>
<body>
  <!-- 로그인 화면 -->
  <div id="loginOverlay">
    <div class="login-logo">GST Dashboard</div>
    <div class="login-box">
      <div class="lock">🔒</div>
      <div class="ltitle" data-i="login_title">비밀번호를 입력하세요</div>
      <input type="password" id="pwInput" data-i-ph="login_ph" placeholder="비밀번호" autocomplete="off">
      <button onclick="checkPw()" data-i="login_btn">로그인</button>
      <div class="login-err" id="pwErr"></div>
    </div>
  </div>

  <div class="lang-wrap">
    <button class="lang-btn" onclick="toggleLang()">🌐 <span id="langLabel">KO</span> ▾</button>
    <div class="lang-dropdown" id="langMenu">
      <div class="lang-item" onclick="setLang('ko')">🇰🇷 한국어</div>
      <div class="lang-item" onclick="setLang('en')">🇺🇸 English</div>
      <div class="lang-item" onclick="setLang('zh')">🇨🇳 中文</div>
      <div class="lang-item" onclick="setLang('ja')">🇯🇵 日本語</div>
    </div>
  </div>

  <div class="logo">GST Dashboard</div>
  <div class="sub" data-i="sub">원하는 대시보드를 선택하세요</div>
  <div class="cards">
    <a href="./hr/" class="card c1">
      <div class="icon">👥</div>
      <div class="title" data-i="hr_title">인원 현황</div>
      <div class="desc" data-i="hr_desc">엔지니어 교육 · 직급 · 직무<br>인터랙티브 분석</div>
    </a>
    <a href="./scrubber/" class="card c2">
      <div class="icon">🌐</div>
      <div class="title" data-i="sc_title">설치 현황</div>
      <div class="desc" data-i="sc_desc">글로벌 스크러버 설치<br>통합 모니터링</div>
    </a>
    <a href="./pm/" class="card c3">
      <div class="icon">🔧</div>
      <div class="title" data-i="pm_title">점검 스케줄</div>
      <div class="desc" data-i="pm_desc">스크러버 PM 점검<br>예방정비 관리</div>
    </a>
    <a href="./fault/" class="card c4">
      <div class="icon">🛠️</div>
      <div class="title" data-i="ft_title">고장 분석</div>
      <div class="desc" data-i="ft_desc">BM·CBM 고장 분석<br>알람·고장코드 추적</div>
    </a>
  </div>

<script>
const PASSWORD = 'gst1234!';  // ← 비밀번호 변경 시 여기만 수정

// 이미 인증했으면 로그인 화면 건너뛰기 (탭 유지되는 동안)
function isAuthed(){ try{ return sessionStorage.getItem('gst_auth')==='1'; }catch(e){ return window.__authed===true; } }
function setAuthed(){ try{ sessionStorage.setItem('gst_auth','1'); }catch(e){ window.__authed=true; } }
function checkPw(){
  const v=document.getElementById('pwInput').value;
  if(v===PASSWORD){
    setAuthed();
    document.getElementById('loginOverlay').classList.add('hidden');
  }else{
    document.getElementById('pwErr').textContent=t('login_wrong');
    document.getElementById('pwInput').value='';
  }
}
function initLogin(){
  if(isAuthed()){ document.getElementById('loginOverlay').classList.add('hidden'); }
  const inp=document.getElementById('pwInput');
  inp.addEventListener('keydown',e=>{ if(e.key==='Enter')checkPw(); });
  if(!isAuthed()) setTimeout(()=>inp.focus(),100);
}

const T={
  ko:{sub:'원하는 대시보드를 선택하세요',hr_title:'인원 현황',hr_desc:'엔지니어 교육 · 직급 · 직무<br>인터랙티브 분석',sc_title:'설치 현황',sc_desc:'글로벌 스크러버 설치<br>통합 모니터링',pm_title:'점검 스케줄',pm_desc:'스크러버 PM 점검<br>예방정비 관리',ft_title:'고장 분석',ft_desc:'BM·CBM 고장 분석<br>알람·고장코드 추적',login_title:'비밀번호를 입력하세요',login_ph:'비밀번호',login_btn:'로그인',login_wrong:'비밀번호가 올바르지 않습니다'},
  en:{sub:'Select a dashboard',hr_title:'Workforce Status',hr_desc:'Engineer training · position · role<br>interactive analysis',sc_title:'Installation Status',sc_desc:'Global scrubber installation<br>integrated monitoring',pm_title:'PM Schedule',pm_desc:'Scrubber PM inspection<br>preventive maintenance',ft_title:'Fault Analysis',ft_desc:'BM·CBM fault analysis<br>alarm & code tracking',login_title:'Enter password',login_ph:'Password',login_btn:'Login',login_wrong:'Incorrect password'},
  zh:{sub:'请选择仪表板',hr_title:'人员状况',hr_desc:'工程师培训 · 职级 · 职务<br>交互式分析',sc_title:'安装状况',sc_desc:'全球洗涤器安装<br>综合监控',pm_title:'点检计划',pm_desc:'洗涤器PM点检<br>预防性维护管理',ft_title:'故障分析',ft_desc:'BM·CBM故障分析<br>报警·故障代码追踪',login_title:'请输入密码',login_ph:'密码',login_btn:'登录',login_wrong:'密码不正确'},
  ja:{sub:'ダッシュボードを選択',hr_title:'人員状況',hr_desc:'エンジニア教育 · 職級 · 職務<br>インタラクティブ分析',sc_title:'設置状況',sc_desc:'グローバルスクラバー設置<br>統合モニタリング',pm_title:'点検スケジュール',pm_desc:'スクラバーPM点検<br>予防保全管理',ft_title:'故障分析',ft_desc:'BM·CBM故障分析<br>アラーム·故障コード追跡',login_title:'パスワードを入力',login_ph:'パスワード',login_btn:'ログイン',login_wrong:'パスワードが正しくありません'}
};
let LANG='ko';
try{ if(window.name && T[window.name]) LANG=window.name; }catch(e){}
function t(k){return (T[LANG]||T.ko)[k]||k;}
function applyLang(){
  document.querySelectorAll('[data-i]').forEach(el=>{el.innerHTML=t(el.getAttribute('data-i'));});
  document.querySelectorAll('[data-i-ph]').forEach(el=>{el.placeholder=t(el.getAttribute('data-i-ph'));});
  document.getElementById('langLabel').textContent=LANG.toUpperCase();
}
function setLang(l){LANG=l;try{window.name=l;}catch(e){}applyLang();document.getElementById('langMenu').classList.remove('open');}
function toggleLang(){document.getElementById('langMenu').classList.toggle('open');}
document.addEventListener('click',e=>{if(!e.target.closest('.lang-wrap'))document.getElementById('langMenu').classList.remove('open');});
applyLang();
initLogin();
</script>
</body>
</html>
